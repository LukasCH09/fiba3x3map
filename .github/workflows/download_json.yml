name: Download JSON Daily

on:
  schedule:
    - cron: '0 0 * * *'  # This cron expression schedules the workflow to run daily at midnight UTC
  workflow_dispatch:  # Allows the workflow to be run manually

jobs:
  download-json:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Download JSON
        run: |
          #!/bin/bash
          # Fetch JSON data
          curl -s 'https://play.fiba3x3.com/api/v2/search/events?name=&input=&when=future&distance=1000&pageNum=1' -o daily_tournament_fetch.json

          # Format JSON data (optional)
          jq . daily_tournament_fetch.json > formatted_daily_tournament_fetch.json
          mv formatted_daily_tournament_fetch.json daily_tournament_fetch.json

      - name: Commit and push JSON file
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add daily_tournament_fetch.json
          git commit -m 'Daily update of JSON data'
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
